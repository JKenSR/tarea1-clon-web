<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelec | Expertos en Tecnología</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="contenedor-header">
            <img src="img/logo-intelec.png" alt="Intelec Logo" class="logo">
            <div class="buscador-falso">
                <input type="text" placeholder="¿Qué estás buscando hoy?">
                <button>🔍</button>
            </div>
            <div class="header-iconos">
    <a href="#" class="icono-link">
        <img src="img/Usuario.png" alt="Mi Cuenta" class="icono-header">
    </a>
    <a href="#" class="icono-link">
        <img src="img/Corazon.png" alt="Favoritos" class="icono-header">
    </a>
    <a href="#" class="icono-link">
        <div class="carrito-container">
            <img src="img/Carrito.png" alt="Carrito de compras" class="icono-header">
            <span class="contador-carrito">0</span>
        </div>
    </a>
</div>
        </div>
    </header>

    <nav>
        <ul>
            <li><a href="#">Sobre Nosotros</a></li>
            <li><a href="#">Tiendas</a></li>
            <li><a href="#">Métodos de Pago</a></li>
            <li><a href="#">Promociones</a></li>
        </ul>
    </nav>

    <main>
        <section class="hero-banner">
            <div class="banner-principal">
                <div>
                    <h2>LO MEJOR EN CASES</h2>
                    <p>SNEAKER Y COSMOS C700M</p>
                </div>
            </div>
            <div class="grid-secundario">
                <a href="#" class="categoria-card">
                    <img src="img/laptop-bg.jpg" alt="Laptops">
                    <span>LAPTOPS</span>
                </a>
                <a href="#" class="categoria-card">
                    <img src="img/monitor-bg.jpg" alt="Monitores">
                    <span>MONITORES</span>
                </a>
            </div>
        </section>

        <h2 class="novedades-titulo">Novedades</h2>
        
        <section class="grid-productos">
            <article class="tarjeta-producto">
                <img src="img/Labtops.png" alt="Laptop" class="img-producto" style="width: 100%;">
                <h3>Laptop Gaming Pro</h3>
                <p class="precio" style="color: var(--rojo-intelec); font-weight: bold;">₡750,000</p>
                <button class="btn-comprar">Ver detalles</button>
            </article>
            </section>
    </main>

    <footer style="background: var(--negro-fondo); color: white; text-align: center; padding: 40px; margin-top: 50px;">
        <p>&copy; 2026 Intelec Costa Rica - Proyecto UCR</p>
    </footer>

</body>
</html>
